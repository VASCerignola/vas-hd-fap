<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VAS-HD (FAP)</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#140a13;
  color:#f2e9ee;
}
.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}
.card{
  background:#1b0f17;
  padding:22px;
  border-radius:18px;
  margin-bottom:20px;
}
label{
  display:block;
  margin-top:20px;
  font-weight:600;
}
input,select{
  width:100%;
  padding:16px;
  margin-top:6px;
  border-radius:14px;
  border:none;
  font-size:16px;
}
button{
  width:100%;
  padding:18px;
  margin-top:28px;
  border-radius:18px;
  border:none;
  background:#c86a9a;
  color:white;
  font-weight:800;
  font-size:17px;
}
.result{
  margin-top:25px;
  padding:20px;
  border-radius:16px;
  font-weight:800;
}
.green{background:#2d6a4f}
.yellow{background:#b58b2a}
.red{background:#b11226}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">
<div class="card">

<label>Infermiere</label>
<input id="nurse">

<label>ID Paziente</label>
<input id="pid">

<label>Tipo accesso</label>
<select id="accesso">
<option value="">--</option>
<option value="FAV">FAV / AVG</option>
<option value="CVC">CVC</option>
</select>

<div id="flowAV" class="hidden">

<label>Thrill</label>
<select id="av_thrill">
<option value=""></option>
<option value="normal">Normale</option>
<option value="reduced">Ridotto</option>
<option value="absent">Assente (CRITICO)</option>
</select>

<label>Qb</label>
<select id="av_qb">
<option value=""></option>
<option value="ok">Adeguato</option>
<option value="low">Ridotto</option>
<option value="none">Non ottenibile (CRITICO)</option>
</select>

<label>Steal</label>
<select id="av_steal">
<option value=""></option>
<option value="no">No</option>
<option value="yes">Sì (CRITICO)</option>
</select>

</div>

<div id="flowCVC" class="hidden">

<label>Qb</label>
<select id="cvc_qb">
<option value=""></option>
<option value="ok">Adeguato</option>
<option value="low">Ridotto</option>
<option value="none">Non ottenibile (CRITICO)</option>
</select>

<label>Aspirazione lumi</label>
<select id="cvc_lumen">
<option value=""></option>
<option value="ok">OK</option>
<option value="one">1 lume difficoltoso</option>
<option value="two">Entrambi non aspirabili (CRITICO)</option>
</select>

<label>Febbre</label>
<select id="cvc_fever">
<option value=""></option>
<option value="no">No</option>
<option value="yes">Sì (CRITICO)</option>
</select>

</div>

<button id="valutaBtn" type="button">VALUTA</button>

<div id="result" class="result hidden"></div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

function el(id){ return document.getElementById(id); }

// Mostra flow corretto
el("accesso").addEventListener("change", function(){
  el("flowAV").classList.add("hidden");
  el("flowCVC").classList.add("hidden");

  if(this.value==="FAV") el("flowAV").classList.remove("hidden");
  if(this.value==="CVC") el("flowCVC").classList.remove("hidden");
});

// Bottone valuta
el("valutaBtn").addEventListener("click", function(){

  let critical=false;
  let indicator=false;

  const accesso = el("accesso").value;

  if(!el("nurse").value || !el("pid").value || !accesso){
    alert("Compilare infermiere, paziente e accesso.");
    return;
  }

  if(accesso==="CVC"){
    if(el("cvc_qb").value==="none" ||
       el("cvc_lumen").value==="two" ||
       el("cvc_fever").value==="yes"){
      critical=true;
    }
    if(el("cvc_qb").value==="low" ||
       el("cvc_lumen").value==="one"){
      indicator=true;
    }
  }

  if(accesso==="FAV"){
    if(el("av_thrill").value==="absent" ||
       el("av_qb").value==="none" ||
       el("av_steal").value==="yes"){
      critical=true;
    }
    if(el("av_thrill").value==="reduced" ||
       el("av_qb").value==="low"){
      indicator=true;
    }
  }

  const box = el("result");
  box.className="result";
  box.classList.remove("hidden");

  if(critical){
    box.classList.add("red");
    box.innerText="🔴 Indicatore critico presente. Valutazione urgente.";
  }
  else if(indicator){
    box.classList.add("yellow");
    box.innerText="🟡 Sospetta disfunzione. Valutazione consigliata.";
  }
  else{
    box.classList.add("green");
    box.innerText="🟢 Nessun indicatore rilevante.";
  }

});

});
</script>

</body>
</html>
