<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VAS-HD (FAP)</title>

<style>
:root{
  --bg:#120b10;
  --card:#1b0f17;
  --line:#6b2b4a;
  --txt:#f2e9ee;
  --mut:#d6b3c4;
  --accent:#c86a9a;
}
body{
  margin:0;
  font-family:-apple-system,system-ui;
  background:var(--bg);
  color:var(--txt);
}
main{
  max-width:650px;
  margin:auto;
  padding:20px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
}
label{
  display:block;
  margin-top:18px;
  margin-bottom:6px;
  color:var(--mut);
}
input,select{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#0f0a0d;
  color:var(--txt);
  font-size:16px;
}
button{
  width:100%;
  padding:18px;
  margin-top:22px;
  border-radius:18px;
  border:none;
  font-weight:900;
  font-size:16px;
}
.btn{
  background:var(--accent);
  color:white;
}
.badge{
  display:inline-block;
  padding:14px 20px;
  border-radius:999px;
  font-weight:900;
  color:white;
  margin-top:14px;
}
.g0{background:#3b7d5b}
.g1{background:#b58b2a}
.g2{background:#c46a2d}
.g3{background:#b11226}
.alert{
  background:#b11226;
  padding:16px;
  border-radius:14px;
  margin-top:16px;
  font-weight:900;
}
.hidden{display:none}
</style>
</head>

<body>

<main>

<h1>VAS-HD (FAP)</h1>
<p style="color:var(--mut)">Supporto decisionale clinico</p>

<div class="card">

<label>Infermiere</label>
<input id="nurse">

<label>ID Paziente</label>
<input id="pid">

<label>Tipo accesso</label>
<select id="accesso" onchange="renderChecklist()">
  <option value="">--</option>
  <option value="FAV">FAV</option>
  <option value="AVG">AVG</option>
  <option value="CVC">CVC</option>
</select>

<div id="checklistArea"></div>

<button class="btn" onclick="valuta()">VALUTA</button>

</div>

<div id="risultato"></div>

</main>

<script>

let LAST_GRADE = 0;

function renderChecklist(){

  const tipo = document.getElementById("accesso").value;
  const area = document.getElementById("checklistArea");
  area.innerHTML = "";

  if(tipo==="CVC"){
    area.innerHTML = `
      <label>Qb</label>
      <select id="qb">
        <option value=""></option>
        <option value="ok">≥95%</option>
        <option value="mid">85–94%</option>
        <option value="low">Non ottenibile</option>
      </select>

      <label>Aspirazione lumi</label>
      <select id="lumi">
        <option value=""></option>
        <option value="ok">OK</option>
        <option value="one">1 lume</option>
        <option value="two">2 lumi</option>
      </select>

      <label>Exit-site</label>
      <select id="exit">
        <option value=""></option>
        <option value="ok">Normale</option>
        <option value="red">Arrossato</option>
        <option value="pus">Essudato</option>
      </select>

      <label>Febbre</label>
      <select id="febbre">
        <option value=""></option>
        <option value="no">No</option>
        <option value="yes">Sì</option>
      </select>
    `;
  }

  if(tipo==="FAV" || tipo==="AVG"){
    area.innerHTML = `
      <label>Qb</label>
      <select id="qb">
        <option value=""></option>
        <option value="ok">≥95%</option>
        <option value="mid">85–94%</option>
        <option value="low">Non ottenibile</option>
      </select>

      <label>Cannulazione</label>
      <select id="cann">
        <option value=""></option>
        <option value="ok">Facile</option>
        <option value="diff">Difficile</option>
        <option value="imp">Impossibile</option>
      </select>

      <label>Segni clinici</label>
      <select id="note">
        <option value=""></option>
        <option value="ok">Normali</option>
        <option value="warn">Thrill/Bruit alterato</option>
        <option value="steal">Ischemia sospetta</option>
      </select>
    `;
  }

}

function valuta(){

  const nurse = nurseInput();
  const pid = pidInput();
  const accesso = document.getElementById("accesso").value;

  if(!nurse || !pid || !accesso){
    alert("Compilare tutti i campi principali");
    return;
  }

  let g = 0;

  const qb = getVal("qb");

  if(accesso==="CVC"){
    const lumi = getVal("lumi");
    const exit = getVal("exit");
    const febbre = getVal("febbre");

    if(qb==="low" || lumi==="two" || exit==="pus" || febbre==="yes") g=3;
    else if(qb==="mid" || lumi==="one" || exit==="red") g=2;
  }

  if(accesso==="FAV" || accesso==="AVG"){
    const cann = getVal("cann");
    const note = getVal("note");

    if(qb==="low" || cann==="imp" || note==="steal") g=3;
    else if(qb==="mid" || cann==="diff" || note==="warn") g=2;
  }

  LAST_GRADE = g;
  mostraRisultato(nurse,pid,accesso,g);
}

function mostraRisultato(n,p,a,g){

  const testi=[
    "Routine",
    "Warning",
    "Disfunzione probabile",
    "Critico"
  ];

  let html=`
  <div class="card">
    <div><b>${n}</b> · ${p} · ${a}</div>
    <span class="badge g${g}">G${g} – ${testi[g]}</span>
  `;

  if(g>=2){
    html+=`<div class="alert">⚠️ Medico da informare</div>`;
  }

  html+=`
    <button class="btn" onclick="inviaWhatsApp()">Invia su WhatsApp</button>
  </div>
  `;

  document.getElementById("risultato").innerHTML=html;
}

function inviaWhatsApp(){

  const nurse=nurseInput();
  const pid=pidInput();
  const accesso=document.getElementById("accesso").value;

  let testo=`VAS-HD (FAP)%0AInfermiere: ${nurse}%0APaziente: ${pid}%0AAccesso: ${accesso}%0AGrading: G${LAST_GRADE}`;
  window.open("https://wa.me/?text="+testo,"_blank");
}

function getVal(id){
  const el=document.getElementById(id);
  return el?el.value:"";
}
function nurseInput(){return document.getElementById("nurse").value.trim();}
function pidInput(){return document.getElementById("pid").value.trim();}

</script>

</body>
</html>
