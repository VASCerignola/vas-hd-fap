<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>VAS-HD (FAP)</title>

<style>
:root{
  --bg:#120b10;--card:#1b0f17;--line:#6b2b4a;
  --txt:#f2e9ee;--mut:#d6b3c4;--accent:#c86a9a;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,system-ui;background:var(--bg);color:var(--txt)}
.hidden{display:none}

header{padding:16px;border-bottom:1px solid var(--line)}
main{padding:18px;max-width:850px;margin:auto}

.card{
  background:rgba(27,15,23,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
}

label{display:block;margin:22px 0 8px;color:var(--mut);font-weight:600}
input,select{
  width:100%;padding:18px;font-size:17px;
  border-radius:16px;border:1px solid var(--line);
  background:#0f0a0d;color:var(--txt)
}

.btn{
  width:100%;padding:18px;border-radius:18px;
  font-weight:900;font-size:17px;margin-top:20px;
  background:var(--accent);color:white;border:0
}

.resultBox{
  padding:20px;border-radius:18px;font-weight:800;margin-top:20px
}
.green{background:#2d6a4f}
.yellow{background:#b58b2a}
.red{background:#b11226}

small{color:var(--mut)}
</style>
</head>

<body>

<header>
  <h2>VAS-HD (FAP)</h2>
  <small>Supporto decisionale basato su indicatori KDOQI</small>
</header>

<main id="home">
  <div class="card">
    <button class="btn" onclick="startWizard()">➕ Nuova valutazione</button>
  </div>
</main>

<!-- STEP 1 -->
<section id="s1" class="hidden">
<main>
<div class="card">
<label>Infermiere</label>
<input id="nurse">
<label>ID Paziente</label>
<input id="pid">
<label>Tipo accesso</label>
<select id="accesso">
<option value="">—</option>
<option value="FAV">FAV</option>
<option value="AVG">AVG</option>
<option value="CVC">CVC</option>
</select>
<button class="btn" onclick="next()">Avanti</button>
</div>
</main>
</section>

<!-- STEP 2 -->
<section id="s2" class="hidden">
<main>
<div class="card">

<div id="flowAV" class="hidden">

<label>Thrill</label>
<select id="av_thrill">
<option></option>
<option value="normal">Normale</option>
<option value="reduced">Ridotto</option>
<option value="absent">Assente (CRITICO)</option>
</select>

<label>Qb ottenuto</label>
<select id="av_qb">
<option></option>
<option value="ok">Adeguato</option>
<option value="low">Ridotto ma ottenibile</option>
<option value="none">Non ottenibile (CRITICO)</option>
</select>

<label>Allarmi ripetuti</label>
<select id="av_alarm">
<option></option>
<option value="no">No</option>
<option value="yes">Sì</option>
</select>

<label>Segni di steal ischemico</label>
<select id="av_steal">
<option></option>
<option value="no">No</option>
<option value="yes">Sì (CRITICO)</option>
</select>

<label>Sanguinamento grave</label>
<select id="av_bleed">
<option></option>
<option value="no">No</option>
<option value="yes">Sì (CRITICO)</option>
</select>

</div>

<div id="flowCVC" class="hidden">

<label>Qb ottenibile</label>
<select id="cvc_qb">
<option></option>
<option value="ok">Adeguato</option>
<option value="low">Ridotto</option>
<option value="none">Non ottenibile (CRITICO)</option>
</select>

<label>Aspirazione lumi</label>
<select id="cvc_lumen">
<option></option>
<option value="ok">Entrambi OK</option>
<option value="one">1 lume difficoltoso</option>
<option value="two">Entrambi non aspirabili (CRITICO)</option>
</select>

<label>Exit-site</label>
<select id="cvc_exit">
<option></option>
<option value="ok">Normale</option>
<option value="red">Arrossato</option>
<option value="pus">Essudato purulento (CRITICO)</option>
</select>

<label>Febbre / brividi</label>
<select id="cvc_fever">
<option></option>
<option value="no">No</option>
<option value="yes">Sì (CRITICO)</option>
</select>

</div>

<button class="btn" onclick="evaluate()">Valuta</button>

<div id="result"></div>

<button class="btn hidden" id="resetBtn" onclick="resetAll()">Nuovo paziente</button>

</div>
</main>
</section>

<script>

function startWizard(){
  home.classList.add("hidden");
  s1.classList.remove("hidden");
}

function next(){
  if(!nurse.value || !pid.value || !accesso.value){
    alert("Compilare tutti i campi.");
    return;
  }
  s1.classList.add("hidden");
  s2.classList.remove("hidden");
  flowAV.classList.add("hidden");
  flowCVC.classList.add("hidden");

  if(accesso.value==="CVC") flowCVC.classList.remove("hidden");
  else flowAV.classList.remove("hidden");
}

function evaluate(){

  let critical=false;
  let indicator=false;

  if(accesso.value==="CVC"){

    if(cvc_qb.value==="none" || 
       cvc_lumen.value==="two" || 
       cvc_exit.value==="pus" || 
       cvc_fever.value==="yes"){
       critical=true;
    }

    if(cvc_qb.value==="low" || cvc_lumen.value==="one" || cvc_exit.value==="red"){
       indicator=true;
    }

  }else{

    if(av_thrill.value==="absent" || 
       av_qb.value==="none" || 
       av_steal.value==="yes" || 
       av_bleed.value==="yes"){
       critical=true;
    }

    if(av_thrill.value==="reduced" || 
       av_qb.value==="low" || 
       av_alarm.value==="yes"){
       indicator=true;
    }

  }

  let box=document.getElementById("result");
  box.innerHTML="";
  box.className="resultBox";

  if(critical){
    box.classList.add("red");
    box.innerHTML="🔴 Presente almeno un indicatore clinico critico. Valutazione urgente raccomandata.";
  }
  else if(indicator){
    box.classList.add("yellow");
    box.innerHTML="🟡 Presente almeno un indicatore di sospetta disfunzione. Valutazione clinica consigliata.";
  }
  else{
    box.classList.add("green");
    box.innerHTML="🟢 Non emergono indicatori clinici rilevanti secondo linee guida.";
  }

  resetBtn.classList.remove("hidden");
}

function resetAll(){
  document.querySelectorAll("select").forEach(s=>s.value="");
  pid.value="";
  result.innerHTML="";
  result.className="";
  resetBtn.classList.add("hidden");
  s2.classList.add("hidden");
  s1.classList.remove("hidden");
}

</script>

</body>
</html>
