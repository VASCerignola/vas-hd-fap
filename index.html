<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VAS-HD (FAP)</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#120b10;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1b0f17;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  border-radius:10px;
  border:none;
  background:#c86a9a;
  color:white;
  font-weight:bold;
  font-size:16px;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  font-weight:bold;
}

.green{background:#2d6a4f}
.yellow{background:#b58b2a}
.red{background:#b11226}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<div id="home" class="card">
  <button onclick="start()">Nuova valutazione</button>
</div>

<div id="form" class="card hidden">

<label>Infermiere</label>
<input id="nurse">

<label>ID Paziente</label>
<input id="pid">

<label>Tipo accesso</label>
<select id="accesso" onchange="toggleFlow()">
  <option value="">--</option>
  <option value="FAV">FAV / AVG</option>
  <option value="CVC">CVC</option>
</select>

<div id="flowAV" class="hidden">

<label>Thrill</label>
<select id="av_thrill">
  <option></option>
  <option value="normal">Normale</option>
  <option value="reduced">Ridotto</option>
  <option value="absent">Assente</option>
</select>

<label>Qb</label>
<select id="av_qb">
  <option></option>
  <option value="ok">Adeguato</option>
  <option value="low">Ridotto</option>
  <option value="none">Non ottenibile</option>
</select>

<label>Steal</label>
<select id="av_steal">
  <option></option>
  <option value="no">No</option>
  <option value="yes">Sì</option>
</select>

</div>

<div id="flowCVC" class="hidden">

<label>Qb</label>
<select id="cvc_qb">
  <option></option>
  <option value="ok">Adeguato</option>
  <option value="low">Ridotto</option>
  <option value="none">Non ottenibile</option>
</select>

<label>Aspirazione lumi</label>
<select id="cvc_lumen">
  <option></option>
  <option value="ok">OK</option>
  <option value="one">1 lume</option>
  <option value="two">Entrambi non aspirabili</option>
</select>

<label>Febbre</label>
<select id="cvc_fever">
  <option></option>
  <option value="no">No</option>
  <option value="yes">Sì</option>
</select>

</div>

<button onclick="evaluate()">VALUTA</button>

<div id="result" class="result hidden"></div>

<button id="resetBtn" class="hidden" onclick="resetForm()">Nuovo paziente</button>

</div>

</div>

<script>

function el(id){
  return document.getElementById(id);
}

function start(){
  el("home").classList.add("hidden");
  el("form").classList.remove("hidden");
}

function toggleFlow(){
  const accesso = el("accesso").value;
  el("flowAV").classList.add("hidden");
  el("flowCVC").classList.add("hidden");

  if(accesso==="FAV"){
    el("flowAV").classList.remove("hidden");
  }
  if(accesso==="CVC"){
    el("flowCVC").classList.remove("hidden");
  }
}

function evaluate(){

  if(!el("nurse").value || !el("pid").value || !el("accesso").value){
    alert("Compilare tutti i campi.");
    return;
  }

  let critical=false;
  let indicator=false;

  const accesso = el("accesso").value;

  if(accesso==="FAV"){

    if(el("av_thrill").value==="absent" ||
       el("av_qb").value==="none" ||
       el("av_steal").value==="yes"){
       critical=true;
    }

    if(el("av_thrill").value==="reduced" ||
       el("av_qb").value==="low"){
       indicator=true;
    }

  }

  if(accesso==="CVC"){

    if(el("cvc_qb").value==="none" ||
       el("cvc_lumen").value==="two" ||
       el("cvc_fever").value==="yes"){
       critical=true;
    }

    if(el("cvc_qb").value==="low" ||
       el("cvc_lumen").value==="one"){
       indicator=true;
    }

  }

  const box = el("result");
  box.className="result";
  box.classList.remove("hidden");

  if(critical){
    box.classList.add("red");
    box.innerText="🔴 Indicatore critico presente. Valutazione urgente.";
  }
  else if(indicator){
    box.classList.add("yellow");
    box.innerText="🟡 Indicatore di sospetta disfunzione. Valutazione consigliata.";
  }
  else{
    box.classList.add("green");
    box.innerText="🟢 Nessun indicatore rilevante.";
  }

  el("resetBtn").classList.remove("hidden");
}

function resetForm(){
  el("form").reset;
  document.querySelectorAll("select").forEach(s=>s.value="");
  el("result").classList.add("hidden");
  el("resetBtn").classList.add("hidden");
}

</script>

</body>
</html>
